<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rating Card</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/3b15603c47.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <section>
      <div class="card">
        <span class="card__star">
          <i class="fa-solid fa-star" style="color: #fc7514"></i>
        </span>
        <div>
          <h1 class="card__title">How did we do?</h1>
          <p class="card__text">
            Please let us know how we did with your support request. All
            feedback is appreciated to help us improve our offering!
          </p>
          <div class="card__numbers">
            <span>1</span>
            <span>2</span>
            <span>3</span>
            <span>4</span>
            <span>5</span>
          </div>
          `
          <button class="card__btn">SUBMIT</button>
        </div>
      </div>
    </section>
  </body>
</html>
